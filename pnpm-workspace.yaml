packages:
  - packages/*
  - .claude/hooks/*
  - '.config/oxlint-plugin'
  - '.config/oxlint-plugin/fleet/*'
  - '.config/oxlint-plugin/repo/*'
allowBuilds:
  cpu-features: false
  esbuild: true
  protobufjs: false
  ssh2: false
autoInstallPeers: true

blockExoticSubdeps: true

catalog:
  '@redwoodjs/agent-ci': 0.16.2
  '@sinclair/typebox': 0.34.49
  '@socketregistry/packageurl-js': 1.4.2
  '@socketregistry/packageurl-js-stable': npm:@socketregistry/packageurl-js@1.4.2
  '@socketsecurity/lib': 6.0.7
  '@socketsecurity/lib-stable': 'npm:@socketsecurity/lib@6.0.7'
  '@socketsecurity/registry': 2.0.2
  '@socketsecurity/registry-stable': npm:@socketsecurity/registry@2.0.2
  '@socketsecurity/sdk': 4.0.1
  '@socketsecurity/sdk-stable': npm:@socketsecurity/sdk@4.0.1
  '@types/mdast': 4.0.4
  '@types/node': 24.9.2
  '@types/shell-quote': 1.7.5
  '@typescript/native-preview': 7.0.0-dev.20250926.1
  '@vitest/coverage-v8': 4.1.8
  '@vitest/ui': 4.1.8
  'dtu-github-actions': 0.16.2
  ecc-agentshield: 1.4.0
  husky: 9.1.7
  'mdast-util-from-markdown': 2.0.3
  'micromark': 4.0.2
  'npm-run-all2': 9.0.1
  oxfmt: 0.37.0
  oxlint: 1.52.0
  'playwright-core': 1.60.0
  'regjsparser': 0.13.1
  'shell-quote': 1.8.4
  taze: 19.14.1
  typescript: 5.9.2
  vitest: 4.1.8
enablePrePostScripts: true

# Force every consumer of Socket's own packages to resolve through the
# catalog-pinned published versions. The `catalog:` form rewrites
# `workspace:*`, `^x.y.z`, and bare-version specs alike to the version
# in the default `catalog:` block above. This defeats accidental
# local-checkout resolution when a sibling repo is on disk.
overrides:
  # Fleet-canonical overrides (managed by socket-wheelhouse sync; do not edit).
  '@socketregistry/packageurl-js': 'catalog:'
  '@socketsecurity/lib': 'catalog:'
  '@socketsecurity/registry': 'catalog:'
  '@socketsecurity/sdk': 'catalog:'
  'semver@>=5.0.0 <7.6.0': '7.8.1'
  'update-notifier@>=4.0.0': '7.3.1'
  'uuid': '11.1.1'

minimumReleaseAge: 10080
minimumReleaseAgeExclude:
  - '@socketaddon/*'
  - '@socketbin/*'
  - '@socketregistry/*'
  - '@socketsecurity/*'
  - '@stuie/*'
  # compromise@14.15.1 is the attested re-publish that clears the
  # soak. The cascaded judgment-reminder hook pins it exactly, so it
  - '@socketdev/*'
  - 'ecc-agentshield'
  - 'sfw'
  - 'socket-*'
  - '@ultrathink/*'
  - '@yuku-parser/*'
  - '@socketoverride/*'
  - 'shell-quote'
  - 'socket'
  # published: 2026-06-09 | removable: 2026-06-16
  - '@yuku-parser/binding-darwin-arm64@0.5.31'
  # published: 2026-06-09 | removable: 2026-06-16
  - '@yuku-parser/binding-darwin-x64@0.5.31'
  # published: 2026-06-09 | removable: 2026-06-16
  - '@yuku-parser/binding-freebsd-x64@0.5.31'
  # published: 2026-06-09 | removable: 2026-06-16
  - '@yuku-parser/binding-linux-arm-gnu@0.5.31'
  # published: 2026-06-09 | removable: 2026-06-16
  - '@yuku-parser/binding-linux-arm-musl@0.5.31'
  # published: 2026-06-09 | removable: 2026-06-16
  - '@yuku-parser/binding-linux-arm64-gnu@0.5.31'
  # published: 2026-06-09 | removable: 2026-06-16
  - '@yuku-parser/binding-linux-arm64-musl@0.5.31'
  # published: 2026-06-09 | removable: 2026-06-16
  - '@yuku-parser/binding-linux-x64-gnu@0.5.31'
  # published: 2026-06-09 | removable: 2026-06-16
  - '@yuku-parser/binding-linux-x64-musl@0.5.31'
  # published: 2026-06-09 | removable: 2026-06-16
  - '@yuku-parser/binding-win32-arm64@0.5.31'
  # published: 2026-06-09 | removable: 2026-06-16
  - '@yuku-parser/binding-win32-x64@0.5.31'

pmOnFail: error
resolutionMode: highest
saveExact: true
trustPolicy: no-downgrade
trustPolicyExclude:
  # Transitive dep of @vitest/coverage-v8@4.1.6. Same maintainer
  # (ariperkkio) + same repo + provenance attestation as earlier
  # versions; the downgrade flag reflects a trusted-publisher ->
  # provenance evidence-class change, not a takeover.
  # published: 2026-05-25 | removable: 2026-06-01
  - 'ast-v8-to-istanbul@1.0.2'
  - 'compromise@14.15.0'
