packages:
  - packages/*
  - .claude/hooks/*
allowBuilds:
  esbuild: true
autoInstallPeers: true

blockExoticSubdeps: true

catalog:
  '@sinclair/typebox': 0.34.49
  '@socketregistry/packageurl-js': 1.4.2
  '@socketregistry/packageurl-js-stable': npm:@socketregistry/packageurl-js@1.4.2
  '@socketsecurity/lib': 6.0.5
  '@socketsecurity/lib-stable': npm:@socketsecurity/lib@6.0.5
  '@socketsecurity/registry': 2.0.2
  '@socketsecurity/registry-stable': npm:@socketsecurity/registry@2.0.2
  '@socketsecurity/sdk': 4.0.1
  '@socketsecurity/sdk-stable': npm:@socketsecurity/sdk@4.0.1
  '@types/mdast': 4.0.4
  '@types/node': 24.9.2
  '@types/shell-quote': 1.7.5
  '@typescript/native-preview': 7.0.0-dev.20250926.1
  '@vitest/coverage-v8': 4.1.6
  '@vitest/ui': 4.1.6
  compromise: 14.15.1
  ecc-agentshield: 1.4.0
  husky: 9.1.7
  'mdast-util-from-markdown': 2.0.3
  'micromark': 4.0.2
  'npm-run-all2': 9.0.0
  oxfmt: 0.37.0
  oxlint: 1.52.0
  'shell-quote': 1.8.4
  taze: 19.9.2
  typescript: 5.9.2
  vitest: 4.0.3
enablePrePostScripts: true

# Force every consumer of Socket's own packages to resolve through the
# catalog-pinned published versions. The `catalog:` form rewrites
# `workspace:*`, `^x.y.z`, and bare-version specs alike to the version
# in the default `catalog:` block above. This defeats accidental
# local-checkout resolution when a sibling repo is on disk.
overrides:
  '@socketregistry/packageurl-js': 'catalog:'
  '@socketsecurity/lib': 'catalog:'
  '@socketsecurity/registry': 'catalog:'
  '@socketsecurity/sdk': 'catalog:'

minimumReleaseAge: 10080
minimumReleaseAgeExclude:
  - '@socketaddon/*'
  - '@socketbin/*'
  - '@socketregistry/*'
  - '@socketsecurity/*'
  - '@stuie/*'
  # Network-mocking lib used in fleet test suites. v15 betas pre-date
  # npm's `time` field for the major; allow pinned beta until v15 GA.
  # published: 2025-10-13 | removable: 2025-10-20
  - 'nock@15.0.0-beta.11'
  # published: 2025-08-04 | removable: 2025-08-11
  - 'npm-run-all2@9.0.0'
  # published: 2026-05-27 | removable: 2026-06-03
  - 'compromise@14.15.1'
  - 'shell-quote'
  - 'vite'
  - 'vitest'
  - '@vitest/coverage-v8'
  - '@vitest/expect'
  - '@vitest/mocker'
  - '@vitest/pretty-format'
  - '@vitest/runner'
  - '@vitest/snapshot'
  - '@vitest/spy'
  - '@vitest/ui'
  - '@vitest/utils'
  - 'rolldown'
  - '@rolldown/pluginutils'
  - '@rolldown/binding-android-arm64'
  - '@rolldown/binding-darwin-arm64'
  - '@rolldown/binding-darwin-x64'
  - '@rolldown/binding-freebsd-x64'
  - '@rolldown/binding-linux-arm-gnueabihf'
  - '@rolldown/binding-linux-arm64-gnu'
  - '@rolldown/binding-linux-arm64-musl'
  - '@rolldown/binding-linux-ppc64-gnu'
  - '@rolldown/binding-linux-s390x-gnu'
  - '@rolldown/binding-linux-x64-gnu'
  - '@rolldown/binding-linux-x64-musl'
  - '@rolldown/binding-openharmony-arm64'
  - '@rolldown/binding-wasm32-wasi'
  - '@rolldown/binding-win32-arm64-msvc'
  - '@rolldown/binding-win32-x64-msvc'

pmOnFail: error
resolutionMode: highest
saveExact: true
trustPolicy: no-downgrade
trustPolicyExclude:
  - 'compromise@14.15.0'
